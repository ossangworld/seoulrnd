<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Album</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/css/lightgallery-bundle.min.css" />
  <style>
    :root {
      --bg: #050505;
      --card: #111;
      --text: #f5f5f5;
      --muted: #999;
    }* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body { padding: 28px; }

header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 28px;
}

.title h1 {
  margin: 0;
  font-size: clamp(28px, 4vw, 56px);
  letter-spacing: -0.05em;
  font-weight: 700;
}

.title p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.hint {
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.gallery a {
  position: relative;
  display: block;
  overflow: hidden;
  border-radius: 18px;
  background: var(--card);
  aspect-ratio: 4 / 5;
  cursor: zoom-in;
}

.gallery img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transform: scale(1.01);
  transition: transform 0.45s ease, filter 0.45s ease;
}

.gallery a:hover img {
  transform: scale(1.07);
  filter: brightness(1.08);
}

.gallery a::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.45));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.gallery a:hover::after { opacity: 1; }

.loading, .empty, .error {
  color: var(--muted);
  padding: 40px 0;
  text-align: center;
  font-size: 14px;
}

footer {
  margin-top: 32px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.lg-backdrop { background-color: rgba(0, 0, 0, 0.96); }

@media (max-width: 680px) {
  body { padding: 16px; }
  header { display: block; margin-bottom: 20px; }
  .hint { margin-top: 10px; white-space: normal; }
  .gallery { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .gallery a { border-radius: 12px; }
}

  </style>
</head>
<body>
  <header>
    <div class="title">
      <h1>Photo Album</h1>
      <p>Click a photo to view it in fullscreen.</p>
    </div>
    <div class="hint">Swipe / Arrow keys / Pinch zoom</div>
  </header>  <main id="lightgallery" class="gallery">
    <div class="loading">Loading photos...</div>
  </main>  <footer>Photo Album Gallery</footer>  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/lightgallery.umd.min.js"></script>  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/plugins/zoom/lg-zoom.umd.min.js"></script>  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/plugins/thumbnail/lg-thumbnail.umd.min.js"></script>  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/plugins/fullscreen/lg-fullscreen.umd.min.js"></script>  <script>
    /*
      설정 방법:
      1. owner를 본인 GitHub 아이디로 변경
      2. repo는 리포지토리 이름. 지금은 PhotoAlbum
      3. branch는 보통 main
      4. imageFolder는 사진 폴더명. 지금은 images
    */
    const owner = 'ossangworld';
    const repo = 'seoulrnd';
    const branch = 'main';
    const imageFolder = 'images';

    const gallery = document.getElementById('lightgallery');
    const imageExtensions = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];

    async function loadImages() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${imageFolder}?ref=${branch}`;

      try {
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error('Cannot load image folder. Check owner, repo, branch, or folder name.');
        }

        const files = await response.json();

        const images = files
          .filter(file => file.type === 'file')
          .filter(file => imageExtensions.some(ext => file.name.toLowerCase().endsWith(ext)))
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

        if (images.length === 0) {
          gallery.innerHTML = '<div class="empty">No photos found in the images folder.</div>';
          return;
        }

        gallery.innerHTML = images.map((file, index) => {
          const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${imageFolder}/${encodeURIComponent(file.name)}`;
          const title = file.name.replace(/\.[^/.]+$/, '');

          return `
            <a href="${imageUrl}" data-sub-html="${title}">
              <img src="${imageUrl}" alt="Photo ${index + 1}" loading="lazy" />
            </a>
          `;
        }).join('');

        lightGallery(gallery, {
          plugins: [lgZoom, lgThumbnail, lgFullscreen],
          speed: 450,
          download: false,
          counter: true,
          thumbnail: true,
          animateThumb: true,
          showThumbByDefault: false,
          actualSize: false,
          mode: 'lg-fade',
          mobileSettings: {
            controls: true,
            showCloseIcon: true,
            download: false
          }
        });
      } catch (error) {
        gallery.innerHTML = `
          <div class="error">
            Failed to load photos.<br />
            Check GitHub ID, repo name, branch name, and images folder.
          </div>
        `;
        console.error(error);
      }
    }

    loadImages();
  </script></body>
</html>
