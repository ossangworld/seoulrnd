<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo Album</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/css/lightgallery-bundle.min.css"/>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #050505;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 42px;
      letter-spacing: -0.04em;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    .gallery a {
      display: block;
      overflow: hidden;
      border-radius: 16px;
      background: #111;
      aspect-ratio: 4 / 5;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .loading {
      color: #999;
      padding: 40px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <h1>Photo Album</h1>

  <div id="lightgallery" class="gallery">
    <div class="loading">Loading photos...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/lightgallery.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/plugins/zoom/lg-zoom.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.8.3/plugins/fullscreen/lg-fullscreen.umd.min.js"></script>

  <script>
    const owner = 'ossangworld';
    const repo = 'photos';
    const branch = 'master';
    const imageFolder = 'images';

    const gallery = document.getElementById('lightgallery');

    async function loadImages() {

      const api =
        `https://api.github.com/repos/${owner}/${repo}/contents/${imageFolder}?ref=${branch}`;

      try {

        const response = await fetch(api);
        const files = await response.json();

        const imageFiles = files.filter(file =>
          file.type === 'file' &&
          /\.(jpg|jpeg|png|webp|gif)$/i.test(file.name)
        );

        if (!imageFiles.length) {
          gallery.innerHTML = '<div class="loading">No images found.</div>';
          return;
        }

        gallery.innerHTML = imageFiles.map(file => `
          <a href="${file.download_url}">
            <img src="${file.download_url}" alt="${file.name}" loading="lazy">
          </a>
        `).join('');

        lightGallery(gallery, {
          plugins: [lgZoom, lgFullscreen],
          speed: 400,
          download: false
        });

      } catch (e) {

        gallery.innerHTML = `
          <div class="loading">
            Failed to load images.<br><br>
            Check:<br>
            - repo is PUBLIC<br>
            - branch name<br>
            - images folder exists
          </div>
        `;

        console.error(e);
      }
    }

    loadImages();
  </script>

</body>
</html>
